# acva — model backend stack for dev.
#
# This file follows plans/milestones/m1_llm_memory.md §B verbatim:
#   - upstream images, no custom Dockerfiles
#   - model files live on the host and are bind-mounted read-only
#   - everything binds to 127.0.0.1 so containers stay private to the host
#   - healthchecks gate compose's restart loop; the orchestrator's HTTP
#     `/health` probes (cfg.supervisor) are independent and gate the
#     dialogue path
#
# The orchestrator (`acva`) itself runs on the host, NOT in compose, so
# the realtime audio path stays direct.
#
# **Every ACVA_* env var below is REQUIRED** — no silent defaults. The
# `${VAR:?…}` syntax fails `docker compose up` with a clear message
# when a var is missing. Populate `packaging/compose/.env` (template
# at repo-root `.env.example`) before bringing the stack up. The
# `tools/acva-models select llm <alias>` command writes the LLM vars
# automatically; the rest are stable knobs you set once per machine.

name: acva

services:
  # ---------------------------------------------------------------------
  # llama.cpp — LLM. Official ggml-org image, CUDA build of llama-server.
  # ---------------------------------------------------------------------
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: acva-llama
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      # Mount only the llama.cpp/ subfolder so the container sees just
      # GGUFs. Sibling subfolders (silero/, speaches/) stay invisible.
      - ${ACVA_MODELS_DIR:?ACVA_MODELS_DIR is required — set in <repo>/.env (cp .env.example .env)}/llama.cpp:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/health"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8081"
      - "--model"
      - "/models/${ACVA_LLM_MODEL:?ACVA_LLM_MODEL is required — run `tools/acva-models select llm <alias>` or edit <repo>/.env}"
      - "--alias"
      - "${ACVA_LLM_ALIAS:?ACVA_LLM_ALIAS is required — same as cfg.llm.model in default.yaml}"
      - "--ctx-size"
      - "8192"
      - "--n-gpu-layers"
      - "999"
      - "--threads"
      - "4"
      - "--metrics"

  # ---------------------------------------------------------------------
  # Speaches — combined STT + TTS, OpenAI-API-compatible. Replaced
  # standalone whisper.cpp/server (port 8082) and piper.http_server
  # (port 8083) during M4B Step 6.
  #
  # Model storage: Speaches owns its own HuggingFace cache layout
  # (`models--<owner>--<repo>/`). We bind-mount a host subdir to the
  # container's HF cache path so models survive restarts. Use
  # `tools/acva-models install <alias>` (or `sync`) to install voices +
  # STT models — it POSTs to Speaches' own /v1/models/{id} endpoint.
  # ---------------------------------------------------------------------
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    container_name: acva-speaches
    ports:
      - "127.0.0.1:8090:8000"
    # LOOPBACK_HOST_URL: when the realtime endpoint commits an
    # audio buffer, Speaches calls its own `/v1/audio/transcriptions`
    # to do the actual STT. Without this env var, it uses an
    # in-process ASGI transport that doesn't share the WhisperModel
    # manager state with the live FastAPI app — calls return 404
    # and committed utterances never produce transcripts. Setting
    # it to the container's own listener forces a real loopback
    # HTTP request and the route resolves correctly.
    #
    # WHISPER__INFERENCE_DEVICE / WHISPER__COMPUTE_TYPE: passed
    # straight to faster-whisper's CTranslate2 backend at model
    # load. `int8_float16` keeps weights as int8 (≈ 30% VRAM
    # reduction vs float16) but runs activations in float16 so
    # GPU Tensor cores stay engaged — practical sweet spot for
    # the 8 GB RTX 4060 + llama-7B-Q4 combo. Override per
    # environment to compare:
    #   - `default`     — model's stored type (often float16)
    #   - `float16`     — full FP16
    #   - `int8_float16`— int8 weights, FP16 activations (default)
    #   - `int8`        — pure int8 (CPU-only, slow on GPU)
    environment:
      LOOPBACK_HOST_URL: http://localhost:8000
      WHISPER__INFERENCE_DEVICE: ${ACVA_WHISPER_DEVICE:?ACVA_WHISPER_DEVICE is required (cuda|cpu)}
      WHISPER__COMPUTE_TYPE:    ${ACVA_WHISPER_COMPUTE_TYPE:?ACVA_WHISPER_COMPUTE_TYPE is required (default|float16|int8_float16|int8)}
      WHISPER__TTL:             ${ACVA_WHISPER_TTL:?ACVA_WHISPER_TTL is required (-1 = never auto-unload; recommended on 8 GB cards)}
    volumes:
      - ${ACVA_MODELS_DIR:?ACVA_MODELS_DIR is required — set in <repo>/.env}/speaches:/home/ubuntu/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 20s
    restart: unless-stopped
