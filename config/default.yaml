# acva default configuration
#
# This is the M0 minimal config. As milestones land, more sections appear:
#   M1: llm, memory, dialogue
#   M2: supervisor
#   M3: tts, playback
#   M4: audio, vad
#   M5: stt, speculation
#   M6: apm
#   M7: barge_in
#
# See plans/project_design.md for the full schema.

logging:
  level: info        # trace | debug | info | warn | error | critical | off
  sink: dir          # stderr | journal | file | dir
  # sink=dir writes a per-run file like
  # `/var/log/acva/acva-YYYYMMDD-HHMMSS.log` named from the local-time
  # startup instant. Pre-create the directory with user-writable
  # perms before first use:
  #   sudo install -d -o $USER -g $USER -m 0755 /var/log/acva
  # If the dir can't be created or opened, log::init falls back to
  # stderr with a one-line warning.
  dir_path: /var/log/acva
  # Tee every log line to stderr in addition to the primary sink.
  # Set true to watch the run live in the terminal AND keep the
  # per-run file. No-op if sink is already stderr/journal.
  mirror_to_stderr: true
  # Periodic GPU VRAM probe (nvidia-smi). Emits a structured `vram`
  # event every N ms with used / free MiB. Catches the creeping-OOM
  # pattern where Speaches' encoder workspace pushes free toward
  # zero before a request fails. Set 0 to disable.
  vram_monitor_interval_ms: 1000
  # file_path: /var/log/acva.log    # required when sink=file
  # When true, log per-event details (transcripts, LLM sentences,
  # TTS/playback timing) at info level for end-to-end debugging.
  trace_events: true

control:
  bind: "127.0.0.1"
  port: 9876

pipeline:
  # Synthetic FSM driver. Set to true to exercise the dialogue path
  # end-to-end without any real backends — useful for M0/M2 demos and
  # for verifying observability before bringing up Compose / audio.
  fake_driver_enabled: false
  fake_sentences_per_turn: 3
  fake_idle_between_turns_ms: 1500
  fake_barge_in_probability: 0.0  # 0..1; e.g. 0.2 for 20% chance of barge-in

llm:
  base_url: "http://127.0.0.1:8081/v1"
  # Default = Qwen3-8B stage-1 dialogue tune (single Q4_K_M GGUF shipped
  # by milwright/qwen-8b-dialog-v1; license unstated by the publisher).
  # Fetch via `scripts/download-llm.sh dialog`.  llama-server ignores
  # this string for routing — it just loads whatever GGUF was passed
  # via `--model` on the command line (set by ACVA_LLM_MODEL in
  # packaging/compose/docker-compose.yml) — so this value is mainly for
  # log lines and `/v1/models` responses.  Other catalog options are
  # listed in `scripts/download-llm.sh`.
  model: "qwen3-stage1"
  unit: "acva-llama.service"
  temperature: 0.7
  # Pre-M7 (no barge-in yet): let the LLM finish whatever it
  # started. 4000 covers a comfortable long monologue (e.g.
  # "count to 100" needs ~350 tokens, "tell me a long story"
  # tops out around 2000-3000 in practice). Drop back to 400
  # once M7 lets the user interrupt.
  max_tokens: 4000
  max_prompt_tokens: 3000
  request_timeout_seconds: 60
  keep_alive_interval_seconds: 60
  health:
    health_url: "http://127.0.0.1:8081/health"
    fail_pipeline_if_down: true
    probe_interval_healthy_ms: 5000
    probe_interval_degraded_ms: 1000
    degraded_max_failures: 3

# STT and TTS sections will be expanded in M5 / M3. M2 only consumes the
# health knobs to keep the supervisor model uniform across services.
stt:
  # M5: streaming WebRTC realtime when true; M4B request/response when
  # false. Production uses streaming; demos that synthesize fixture
  # audio offline (e.g. acva demo stt) flip this off.
  streaming: true
  # M5: BCP-47 language code passed into Speaches' input_audio_transcription.
  # Speaches' realtime endpoint doesn't return per-utterance detected
  # language; this value is also stamped onto FinalTranscript.lang so
  # downstream TTS voice routing (cfg.tts.voices[lang]) and
  # PromptBuilder system-prompt selection (cfg.dialogue.system_prompts[lang])
  # work without requiring detection. Switch to "ru" to use the
  # ruslan voice and the Russian system prompt. M9 (post-MVP) replaces
  # this with per-utterance detection.
  language: "ru"
  # M4B: STT goes through Speaches' OpenAI-compatible
  # POST /v1/audio/transcriptions. Setting `base_url` enables real
  # transcription on every UtteranceReady event from the M4 audio
  # pipeline; leaving it empty preserves the synthetic-FinalTranscript
  # path for M0–M2 demos.
  #
  # The `health` block still points at the legacy whisper.cpp service
  # (port 8082) until M4B Step 6 retires that container.
  base_url: "http://127.0.0.1:8090/v1"
  # `Systran/faster-whisper-large-v3` (~3.5 GB resident) — best
  # multilingual quality. Fits cleanly on the 8 GB RTX 4060 only
  # **when llama-server is stopped** (or running with a much smaller
  # n_ctx / Q3 quant). With the default llama-7B-Q4 (~5 GB resident)
  # this model OOMs at first transcription.
  #
  # Other options (see `scripts/download-stt.sh`):
  #   - `deepdml/faster-whisper-large-v3-turbo-ct2` (~2.5 GB) —
  #     near-best quality, fits-in-principle alongside llama but the
  #     encoder workspace can OOM under sustained load (M6 episode
  #     2026-05-03); needs llama VRAM relief to be reliable.
  #   - `Systran/faster-whisper-medium` (~2.6 GB) — comfortable
  #     margin alongside default llama; previous default. Quality
  #     drop is mild on clean close-mic speech but noticeable on
  #     accents/noise.
  #   - `Systran/faster-whisper-small` (~700 MB) — last-resort
  #     fallback if memory pressure forces it.
  model: "deepdml/faster-whisper-large-v3-turbo-ct2"
  request_timeout_seconds: 30
  # M6 — force a 1-second silent transcription at acva startup so the
  # Whisper model loads into VRAM before the first real user turn. With
  # quantised models (int8_float16) the cold-load takes 3-5 s; without
  # warm-up that latency lands on the user's first sentence. Set false
  # to skip when running against a remote Speaches that's already warm.
  warmup_on_startup: true
  health:
    health_url: "http://127.0.0.1:8090/health"
    fail_pipeline_if_down: false   # becomes true in M5 once the dialogue path needs STT
    probe_interval_healthy_ms: 5000
    probe_interval_degraded_ms: 1000
    degraded_max_failures: 3

tts:
  # TTS goes through Speaches. One base_url serves every language;
  # per-language `model_id` + `voice_id` route the request via
  # Speaches' OpenAI-API-compatible POST /v1/audio/speech.
  base_url: "http://127.0.0.1:8090/v1"
  health:
    health_url: "http://127.0.0.1:8090/health"
    fail_pipeline_if_down: false
    probe_interval_healthy_ms: 5000
    probe_interval_degraded_ms: 1000
    degraded_max_failures: 3
  voices:
    # `model_id` is the registry id Speaches loads via
    # `scripts/download-speaches-models.sh`. `voice_id` is required —
    # for single-speaker Piper voices it's just the speaker name
    # (e.g. "amy" for piper-en_US-amy-medium); for Kokoro models
    # use the published voice id like "af_bella".
    en: { model_id: "speaches-ai/piper-en_US-amy-medium", voice_id: "amy" }
    # Russian: ruslan is the default; the downloader pulls denis,
    # dmitri, and irina too — swap voice_id + model_id (same
    # piper-ru_RU-<name>-medium pattern) to try them.
    ru: { model_id: "speaches-ai/piper-ru_RU-ruslan-medium", voice_id: "ruslan" }
  fallback_lang: en
  # Bumped from 10 to 30 on 2026-05-03: long sentences (e.g. a
  # numbered list of 100 items) at speed=1.25 take ~25 s to fully
  # stream; libcurl was aborting mid-stream with "Transferred a
  # partial file" and the EOS-fallback path hid the cause.
  request_timeout_seconds: 30
  # Spoken tempo in words-per-minute. Translated to OpenAI `speed`
  # at native_wpm = 160 (typical Piper baseline). 200 ≈ speed=1.25,
  # a touch faster than conversational. Range [50, 400] (or 0 to
  # disable the field and use the voice's native cadence).
  tempo_wpm: 240

# M3 — audio output + M4 audio capture. Output knobs ship in M3;
# input_device + capture_enabled are M4 additions. capture_enabled
# defaults to false so existing M0–M3 setups keep working unchanged;
# flip to true to bring up the mic + VAD path.
audio:
  # M6B — to route through PipeWire's module-echo-cancel virtual
  # devices, leave both at `default` here and override per-process
  # via PulseAudio:
  #   pactl load-module module-echo-cancel
  #   PULSE_SINK=echo-cancel-sink PULSE_SOURCE=echo-cancel-source \
  #     ./_build/dev/acva demo aec-record
  # The ALSA sidestep restricts PortAudio's enumeration to a single
  # `default → pulse` device (avoids a 4-minute ALSA probe deadlock),
  # so substring-matching the echo-cancel devices directly here will
  # not work — PulseAudio's per-process default routing does.
  output_device: default     # "default" | substring of device name | "none" (skips PortAudio init)
  input_device:  default     # M4 — capture device, same matching rules as output
  # M5 default = full speech-to-speech pipeline. The combination
  # below (capture on + half-duplex on) is the working speakers
  # mode pre-M6: mic captures, but is gated off while the assistant
  # speaks so its own voice doesn't trigger VAD. Trade-off: no
  # barge-in until M6 (AEC) + M7 land. Set capture_enabled: false
  # for text-only mode (e.g. `acva --stdin` chat); set
  # half_duplex_while_speaking: false on a headphones-only setup
  # where speaker bleed isn't a concern.
  capture_enabled: true
  sample_rate_hz: 48000
  buffer_frames: 480         # 10 ms @ 48 kHz
  half_duplex_while_speaking: false
  half_duplex_hangover_ms: 200
  # M6 — AEC reference-signal loopback ring. The PlaybackEngine writes
  # the chunk it just emitted (with a wall-clock timestamp) into this
  # ring; the APM wrapper pulls aligned reference frames from it. 2 s
  # covers the typical speaker → air → mic round-trip plus pipeline
  # jitter under load.
  loopback:
    ring_seconds: 2
  # M6 — sidestep PortAudio's full ALSA-PCM probe at startup. The
  # alsa-pipewire-jack glue's snd_pcm_close deadlocks pipewire's
  # thread loop, adding ~4 minutes to acva startup until it times
  # out. With this on, we point ALSA_CONFIG_PATH at a tmpfile that
  # only defines `default → pulse`; PortAudio enumerates one PCM
  # and returns immediately. Routing still works because pipewire
  # also exposes a pulse interface. Set false to use the system
  # asound.conf verbatim.
  skip_alsa_full_probe: true

playback:
  # 0 = unbounded queue. Pre-M7 default — let the full LLM response
  # sit in memory rather than drop chunks mid-sentence. Worst-case
  # ~25 MB for a max-tokens response. Re-introduce a cap once
  # barge-in lands and cancellation can drain the queue cleanly.
  max_queue_chunks: 0
  underrun_log_throttle_ms: 1000

# M4 — Silero VAD + utterance assembly.
vad:
  provider: silero
  # Empty path → main.cpp resolves to
  # ${XDG_DATA_HOME}/acva/models/silero/silero_vad.onnx (the per-engine
  # subfolder layout; sibling of llama.cpp/ and speaches/). If the
  # file is missing, the audio pipeline runs without VAD and logs a
  # warning. Run scripts/download-vad.sh to fetch it.
  model_path: ""
  onset_threshold: 0.5
  offset_threshold: 0.35
  min_speech_ms: 200
  hangover_ms: 600
  pre_padding_ms: 300
  post_padding_ms: 100

utterance:
  max_in_flight: 3
  max_duration_ms: 60000     # safety cap for long monologues

# M6 + M6B — speech DSP stack.
#
# Two valid configurations.  Pick one — the knobs are NOT independent.
#
# (1) System AEC via PipeWire (DEFAULT — recommended on Linux desktops):
#       use_system_aec: true
#       aec_enabled: false
#       ns_enabled:  false
#       agc_enabled: false
#     PipeWire's module-echo-cancel runs the same webrtc-audio-processing
#     library upstream of acva, on the raw ALSA mic feed BEFORE the
#     per-application codec DSP touches it.  We load it with
#     noise_suppression=1 + digital_gain_control=1 + high_pass_filter=1,
#     so NS/AGC/HPF are already happening upstream — turning ours on
#     too produces double-processing artifacts (NS over-suppresses,
#     two AGCs fight for level).  Our APM hits the all-off short-circuit
#     in src/audio/apm.cpp and is a true pass-through.
#     Measurement 2026-05-03: 25-29 dB ERLE in the speech band on the
#     dev workstation (M6 acceptance gate 4 ≥ 25 dB).
#
# (2) In-process APM only (fallback for non-PipeWire systems):
#       use_system_aec: false
#       aec_enabled: true
#       ns_enabled:  true
#       agc_enabled: true
#     This is the M6 in-process WebRTC AudioProcessing path.  ERLE on
#     the dev workstation's integrated codec is poor — see
#     docs/aec_report.md § 6 — but on cooperative hardware (USB mic
#     setups) it's the right path.  When the webrtc-audio-processing-1
#     build dep is missing, the wrapper compiles to a no-op stub and
#     these knobs have no effect.
#
# DO NOT enable both stacks simultaneously: an in-process AEC running
# on a pre-cleaned signal produces an ~800 ms zeroed-output convergence
# transient at the start of every utterance (the assistant's first
# words go missing).
apm:
  aec_enabled: false
  ns_enabled: false
  agc_enabled: false
  initial_delay_estimate_ms: 50    # speaker → air → mic round-trip guess
  max_delay_ms: 250                # sanity ceiling on the estimator
  # M6B Step 3.2 — auto-load PipeWire's `module-echo-cancel` on
  # startup and route this process's audio through it (PULSE_SINK /
  # PULSE_SOURCE env vars set before PortAudio init; module unloaded
  # on shutdown if we loaded it).  See block comment above for why
  # the other three knobs are off.
  use_system_aec: true

supervisor:
  pipeline_fail_grace_seconds: 30
  probe_timeout_ms: 3000

memory:
  # Empty (or relative) → resolved to
  #   ${XDG_DATA_HOME:-$HOME/.local/share}/acva/<value>
  # at startup. Set an absolute path to override (e.g. for tests or
  # multi-tenant installs). The parent directory is created on first run.
  db_path: ""
  recent_turns_n: 10
  write_queue_capacity: 256
  summary:
    trigger: turns                # turns | tokens | idle | hybrid
    turn_threshold: 15
    token_threshold: 4000
    idle_seconds: 120
    language: dominant            # dominant | english | recent
  facts:
    policy: conservative          # conservative | moderate | aggressive | manual_only
    confidence_threshold: 0.7

dialogue:
  recent_turns_n: 10
  # Pre-M7: let the LLM emit as many sentences as it wants.
  # Manager cancels the LLM stream when the cap is hit; without
  # barge-in there's no reason to clamp this. Bumping to 100 is
  # effectively "unlimited" for a voice assistant. Drop back to 6
  # once barge-in (M7) lets the user interrupt.
  max_assistant_sentences: 100
  max_assistant_tokens: 4000
  # Self-listen feedback loop. When enabled, every successfully-
  # synthesized sentence is also pushed through STT in a background
  # thread, then logged as a `self_listen` event with the LLM's
  # original text vs what STT heard. Catches audio dropouts (queue
  # overflow drops, mid-stream truncation, mispronounced characters)
  # that aren't visible in the LLM/TTS path. Default off — adds
  # extra STT load and won't fit alongside the production STT call
  # on tight VRAM (see project_gpu_cdi_and_vram).
  self_listen:
    enabled: false
    max_in_flight: 1
  fallback_language: en
  sentence_splitter:
    # Forced flush at this length when no terminal punctuation
    # appears. Lowered from 600 to 300 on 2026-05-03 — a 100-item
    # comma-only list (430 chars, no periods) fit under the old
    # cap and produced one ~25 s TTS request that hit the libcurl
    # timeout. Smaller chunks also smooth out time-to-first-audio
    # by letting playback start while later sentences synthesize.
    max_sentence_chars: 80
    detect_code_fences: true
  system_prompts:
    en: |
      You are a local voice assistant.
      Answer in short spoken paragraphs.
      Prefer direct answers over long lists.
      Ask at most one clarification question.
      For technical topics, give concise but precise explanations.
    ru: |
      Ты локальный голосовой ассистент.
      Отвечай короткими разговорными абзацами.
      Предпочитай прямые ответы длинным спискам.
      Задавай не более одного уточняющего вопроса.
      По техническим темам отвечай кратко, но точно.
