# acva default configuration
#
# This is the M0 minimal config. As milestones land, more sections appear:
#   M1: llm, memory, dialogue
#   M2: supervisor
#   M3: tts, playback
#   M4: audio, vad
#   M5: stt, speculation
#   M6: apm
#   M7: barge_in
#
# See plans/project_design.md for the full schema.

logging:
  level: info        # trace | debug | info | warn | error | critical | off
  sink: stderr       # stderr | journal | file
  # file_path: /var/log/acva.log    # required when sink=file
  # When true, log per-event details (transcripts, LLM sentences,
  # TTS/playback timing) at info level for end-to-end debugging.
  trace_events: true

control:
  bind: "127.0.0.1"
  port: 9876

pipeline:
  # Synthetic FSM driver. Set to true to exercise the dialogue path
  # end-to-end without any real backends — useful for M0/M2 demos and
  # for verifying observability before bringing up Compose / audio.
  fake_driver_enabled: false
  fake_sentences_per_turn: 3
  fake_idle_between_turns_ms: 1500
  fake_barge_in_probability: 0.0  # 0..1; e.g. 0.2 for 20% chance of barge-in

llm:
  base_url: "http://127.0.0.1:8081/v1"
  model: "qwen2.5-7b-instruct"
  unit: "acva-llama.service"
  temperature: 0.7
  max_tokens: 400
  max_prompt_tokens: 3000
  request_timeout_seconds: 60
  keep_alive_interval_seconds: 60
  health:
    health_url: "http://127.0.0.1:8081/health"
    fail_pipeline_if_down: true
    probe_interval_healthy_ms: 5000
    probe_interval_degraded_ms: 1000
    degraded_max_failures: 3

# STT and TTS sections will be expanded in M5 / M3. M2 only consumes the
# health knobs to keep the supervisor model uniform across services.
stt:
  # M5: streaming WebRTC realtime when true; M4B request/response when
  # false. Production uses streaming; demos that synthesize fixture
  # audio offline (e.g. acva demo stt) flip this off.
  streaming: true
  # M5: BCP-47 language code passed into Speaches' input_audio_transcription.
  # Speaches' realtime endpoint doesn't return per-utterance detected
  # language; this value is also stamped onto FinalTranscript.lang so
  # downstream TTS voice routing (cfg.tts.voices[lang]) and
  # PromptBuilder system-prompt selection (cfg.dialogue.system_prompts[lang])
  # work without requiring detection. Switch to "ru" to use the
  # ruslan voice and the Russian system prompt. M9 (post-MVP) replaces
  # this with per-utterance detection.
  language: "ru"
  # M4B: STT goes through Speaches' OpenAI-compatible
  # POST /v1/audio/transcriptions. Setting `base_url` enables real
  # transcription on every UtteranceReady event from the M4 audio
  # pipeline; leaving it empty preserves the synthetic-FinalTranscript
  # path for M0–M2 demos.
  #
  # The `health` block still points at the legacy whisper.cpp service
  # (port 8082) until M4B Step 6 retires that container.
  base_url: "http://127.0.0.1:8090/v1"
  # `Systran/faster-whisper-large-v3` (~3.5 GB resident) — best
  # multilingual quality. Fits cleanly on the 8 GB RTX 4060 only
  # **when llama-server is stopped** (or running with a much smaller
  # n_ctx / Q3 quant). With the default llama-7B-Q4 (~5 GB resident)
  # this model OOMs at first transcription.
  #
  # Other options (see `scripts/download-stt.sh`):
  #   - `deepdml/faster-whisper-large-v3-turbo-ct2` (~2.5 GB) —
  #     near-best quality, fits-in-principle alongside llama but the
  #     encoder workspace can OOM under sustained load (M6 episode
  #     2026-05-03); needs llama VRAM relief to be reliable.
  #   - `Systran/faster-whisper-medium` (~2.6 GB) — comfortable
  #     margin alongside default llama; previous default. Quality
  #     drop is mild on clean close-mic speech but noticeable on
  #     accents/noise.
  #   - `Systran/faster-whisper-small` (~700 MB) — last-resort
  #     fallback if memory pressure forces it.
  model: "Systran/faster-whisper-large-v3"
  request_timeout_seconds: 30
  # M6 — force a 1-second silent transcription at acva startup so the
  # Whisper model loads into VRAM before the first real user turn. With
  # quantised models (int8_float16) the cold-load takes 3-5 s; without
  # warm-up that latency lands on the user's first sentence. Set false
  # to skip when running against a remote Speaches that's already warm.
  warmup_on_startup: true
  health:
    health_url: "http://127.0.0.1:8090/health"
    fail_pipeline_if_down: false   # becomes true in M5 once the dialogue path needs STT
    probe_interval_healthy_ms: 5000
    probe_interval_degraded_ms: 1000
    degraded_max_failures: 3

tts:
  # TTS goes through Speaches. One base_url serves every language;
  # per-language `model_id` + `voice_id` route the request via
  # Speaches' OpenAI-API-compatible POST /v1/audio/speech.
  base_url: "http://127.0.0.1:8090/v1"
  health:
    health_url: "http://127.0.0.1:8090/health"
    fail_pipeline_if_down: false
    probe_interval_healthy_ms: 5000
    probe_interval_degraded_ms: 1000
    degraded_max_failures: 3
  voices:
    # `model_id` is the registry id Speaches loads via
    # `scripts/download-speaches-models.sh`. `voice_id` is required —
    # for single-speaker Piper voices it's just the speaker name
    # (e.g. "amy" for piper-en_US-amy-medium); for Kokoro models
    # use the published voice id like "af_bella".
    en: { model_id: "speaches-ai/piper-en_US-amy-medium", voice_id: "amy" }
    # Russian: ruslan is the default; the downloader pulls denis,
    # dmitri, and irina too — swap voice_id + model_id (same
    # piper-ru_RU-<name>-medium pattern) to try them.
    ru: { model_id: "speaches-ai/piper-ru_RU-ruslan-medium", voice_id: "ruslan" }
  fallback_lang: en
  request_timeout_seconds: 10

# M3 — audio output + M4 audio capture. Output knobs ship in M3;
# input_device + capture_enabled are M4 additions. capture_enabled
# defaults to false so existing M0–M3 setups keep working unchanged;
# flip to true to bring up the mic + VAD path.
audio:
  output_device: default     # "default" | substring of device name | "none" (skips PortAudio init)
  input_device: default      # M4 — capture device, same matching rules as output
  # M5 default = full speech-to-speech pipeline. The combination
  # below (capture on + half-duplex on) is the working speakers
  # mode pre-M6: mic captures, but is gated off while the assistant
  # speaks so its own voice doesn't trigger VAD. Trade-off: no
  # barge-in until M6 (AEC) + M7 land. Set capture_enabled: false
  # for text-only mode (e.g. `acva --stdin` chat); set
  # half_duplex_while_speaking: false on a headphones-only setup
  # where speaker bleed isn't a concern.
  capture_enabled: true
  sample_rate_hz: 48000
  buffer_frames: 480         # 10 ms @ 48 kHz
  half_duplex_while_speaking: true
  half_duplex_hangover_ms: 200
  # M6 — AEC reference-signal loopback ring. The PlaybackEngine writes
  # the chunk it just emitted (with a wall-clock timestamp) into this
  # ring; the APM wrapper pulls aligned reference frames from it. 2 s
  # covers the typical speaker → air → mic round-trip plus pipeline
  # jitter under load.
  loopback:
    ring_seconds: 2

playback:
  max_queue_chunks: 64       # ~640 ms ahead of the audio cb
  underrun_log_throttle_ms: 1000

# M4 — Silero VAD + utterance assembly.
vad:
  provider: silero
  # Empty path → main.cpp resolves to
  # ${XDG_DATA_HOME}/acva/models/silero/silero_vad.onnx (the per-engine
  # subfolder layout; sibling of llama.cpp/ and speaches/). If the
  # file is missing, the audio pipeline runs without VAD and logs a
  # warning. Run scripts/download-vad.sh to fetch it.
  model_path: ""
  onset_threshold: 0.5
  offset_threshold: 0.35
  min_speech_ms: 200
  hangover_ms: 600
  pre_padding_ms: 300
  post_padding_ms: 100

utterance:
  max_in_flight: 3
  max_duration_ms: 60000     # safety cap for long monologues

# M6 — WebRTC AudioProcessing (AEC + NS + AGC). When the
# webrtc-audio-processing-1 package is missing at build time the wrapper
# is a no-op pass-through and these knobs have no effect. Keep aec on
# whenever capture_enabled is on; with half_duplex_while_speaking also
# on the two protect each other (AEC handles speaker bleed; the
# half-duplex gate covers the residual until AEC converges).
apm:
  aec_enabled: true
  ns_enabled: true
  agc_enabled: true
  initial_delay_estimate_ms: 50    # speaker → air → mic round-trip guess
  max_delay_ms: 250                # sanity ceiling on the estimator

supervisor:
  pipeline_fail_grace_seconds: 30
  probe_timeout_ms: 3000

memory:
  # Empty (or relative) → resolved to
  #   ${XDG_DATA_HOME:-$HOME/.local/share}/acva/<value>
  # at startup. Set an absolute path to override (e.g. for tests or
  # multi-tenant installs). The parent directory is created on first run.
  db_path: ""
  recent_turns_n: 10
  write_queue_capacity: 256
  summary:
    trigger: turns                # turns | tokens | idle | hybrid
    turn_threshold: 15
    token_threshold: 4000
    idle_seconds: 120
    language: dominant            # dominant | english | recent
  facts:
    policy: conservative          # conservative | moderate | aggressive | manual_only
    confidence_threshold: 0.7

dialogue:
  recent_turns_n: 10
  max_assistant_sentences: 6
  max_assistant_tokens: 400
  fallback_language: en
  sentence_splitter:
    max_sentence_chars: 600
    detect_code_fences: true
  system_prompts:
    en: |
      You are a local voice assistant.
      Answer in short spoken paragraphs.
      Prefer direct answers over long lists.
      Ask at most one clarification question.
      For technical topics, give concise but precise explanations.
    ru: |
      Ты локальный голосовой ассистент.
      Отвечай короткими разговорными абзацами.
      Предпочитай прямые ответы длинным спискам.
      Задавай не более одного уточняющего вопроса.
      По техническим темам отвечай кратко, но точно.
