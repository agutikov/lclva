# acva — model backend stack for dev.
#
# This file follows plans/milestones/m1_llm_memory.md §B verbatim:
#   - upstream images, no custom Dockerfiles
#   - model files live on the host and are bind-mounted read-only
#   - everything binds to 127.0.0.1 so containers stay private to the host
#   - healthchecks gate compose's restart loop; the orchestrator's HTTP
#     `/health` probes (cfg.supervisor) are independent and gate the
#     dialogue path
#
# The orchestrator (`acva`) itself runs on the host, NOT in compose, so
# the realtime audio path stays direct.

name: acva

services:
  # ---------------------------------------------------------------------
  # llama.cpp — LLM. Official ggml-org image, CUDA build of llama-server.
  # ---------------------------------------------------------------------
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: acva-llama
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ${ACVA_MODELS_DIR:-${HOME}/.local/share/acva/models}:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/health"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8081"
      - "--model"
      - "/models/${ACVA_LLM_MODEL:-qwen2.5-7b-instruct-q4_k_m-00001-of-00002.gguf}"
      - "--alias"
      - "qwen2.5-7b-instruct"
      - "--ctx-size"
      - "8192"
      - "--n-gpu-layers"
      - "999"
      - "--threads"
      - "4"
      - "--metrics"

  # ---------------------------------------------------------------------
  # Speaches — combined STT + TTS, OpenAI-API-compatible. Replaced
  # standalone whisper.cpp/server (port 8082) and piper.http_server
  # (port 8083) during M4B Step 6.
  #
  # Model storage: Speaches owns its own HuggingFace cache layout
  # (`models--<owner>--<repo>/`). We bind-mount a host subdir to the
  # container's HF cache path so models survive restarts. Use
  # `scripts/download-speaches-models.sh` to install voices + STT
  # models via Speaches' own POST /v1/models/{id} endpoint.
  # ---------------------------------------------------------------------
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    container_name: acva-speaches
    ports:
      - "127.0.0.1:8090:8000"
    volumes:
      - ${ACVA_MODELS_DIR:-${HOME}/.local/share/acva/models}/speaches:/home/ubuntu/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 20s
    restart: unless-stopped
