# lclva default configuration
#
# This is the M0 minimal config. As milestones land, more sections appear:
#   M1: llm, memory, dialogue
#   M2: supervisor
#   M3: tts, playback
#   M4: audio, vad
#   M5: stt, speculation
#   M6: apm
#   M7: barge_in
#
# See plans/project_design.md for the full schema.

logging:
  level: info        # trace | debug | info | warn | error | critical | off
  sink: stderr       # stderr | journal | file
  # file_path: /var/log/lclva.log    # required when sink=file

control:
  bind: "127.0.0.1"
  port: 9876

pipeline:
  fake_driver_enabled: true       # M0: drive FSM with synthetic events
  fake_sentences_per_turn: 3
  fake_idle_between_turns_ms: 1500
  fake_barge_in_probability: 0.0  # 0..1; e.g. 0.2 for 20% chance of barge-in

llm:
  base_url: "http://127.0.0.1:8081/v1"
  model: "qwen2.5-7b-instruct"
  unit: "lclva-llama.service"
  temperature: 0.7
  max_tokens: 400
  max_prompt_tokens: 3000
  request_timeout_seconds: 60
  keep_alive_interval_seconds: 60

memory:
  # Resolved relative to CWD if not absolute. Production deployments should
  # set an absolute path under XDG_DATA_HOME.
  db_path: "lclva.db"
  recent_turns_n: 10
  write_queue_capacity: 256
  summary:
    trigger: turns                # turns | tokens | idle | hybrid
    turn_threshold: 15
    token_threshold: 4000
    idle_seconds: 120
    language: dominant            # dominant | english | recent
  facts:
    policy: conservative          # conservative | moderate | aggressive | manual_only
    confidence_threshold: 0.7

dialogue:
  recent_turns_n: 10
  max_assistant_sentences: 6
  max_assistant_tokens: 400
  fallback_language: en
  sentence_splitter:
    max_sentence_chars: 600
    detect_code_fences: true
  system_prompts:
    en: |
      You are a local voice assistant.
      Answer in short spoken paragraphs.
      Prefer direct answers over long lists.
      Ask at most one clarification question.
      For technical topics, give concise but precise explanations.
